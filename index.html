<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard Ultra Pro+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* THEME */
:root {
  --bg: linear-gradient(135deg,#667eea,#764ba2);
  --text: #fff;
  --card: rgba(255,255,255,0.15);
}

.dark-theme {
  --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s;
}

/* LOADER */
#loader {
  position: fixed;
  width:100%; height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:20px;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.container {
  padding: 20px;
  animation: fadeUp 0.6s ease;
}

.section-title {
  font-weight:bold;
  margin: 15px 0;
}

/* CARD */
.glass {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.glass:hover {
  transform: scale(1.05);
}

/* BUTTON */
button {
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  cursor: pointer;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: white;
}

/* TABLE */
table { width:100%; }
td, th { padding:10px; text-align:center; }

</style>
</head>

<body>

<div id="loader">⏳ Loading data...</div>

<div class="container">

<h1>💰 Finance Dashboard Ultra Pro+</h1>

<div class="section-title">⚙️ Controls</div>
<div class="glass">
<button onclick="toggleTheme()">🌙 Theme</button>
<button onclick="resetData()">♻ Reset Demo</button>
<button onclick="exportCSV()">📤 Export</button>
</div>

<div class="section-title">📊 Overview</div>
<div class="glass">
Balance: <span id="balance"></span><br>
Income: <span id="income"></span><br>
Expense: <span id="expense"></span>
</div>

<div class="section-title">📋 Transactions</div>
<div class="glass">
<table>
<thead>
<tr>
<th>Date</th><th>Amount</th><th>Category</th><th>Type</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

/* DEMO DATA */
const defaultData = [
 {date:"2026-03-25", amount:45000, category:"Salary", type:"income"},
 {date:"2026-03-27", amount:500, category:"Food", type:"expense"},
 {date:"2026-03-30", amount:7000, category:"Freelance", type:"income"},
 {date:"2026-04-01", amount:1200, category:"Fuel", type:"expense"}
];

/* FAKE API */
function fakeAPI(){
 return new Promise(resolve=>{
  setTimeout(()=>{
   resolve(JSON.parse(localStorage.getItem("data")) || defaultData);
  },1500);
 });
}

let state = { transactions: [] };

/* LOAD DATA */
async function loadData(){
 let data = await fakeAPI();
 state.transactions = data;
 document.getElementById("loader").style.display="none";
 update();
}

/* RESET */
function resetData(){
 localStorage.removeItem("data");
 location.reload();
}

/* CALCULATE */
function calculate(){
 let income=0, expense=0;
 state.transactions.forEach(t=>{
  t.type==="income" ? income+=t.amount : expense+=t.amount;
 });
 document.getElementById("income").innerText=income;
 document.getElementById("expense").innerText=expense;
 document.getElementById("balance").innerText=income-expense;
}

/* TABLE */
function renderTable(){
 let body=document.getElementById("tableBody");
 body.innerHTML="";
 state.transactions.forEach(t=>{
  body.innerHTML+=`
  <tr>
  <td>${t.date}</td>
  <td>${t.amount}</td>
  <td>${t.category}</td>
  <td>${t.type}</td>
  </tr>`;
 });
}

/* EXPORT */
function exportCSV(){
 let csv="Date,Amount,Category,Type\n";
 state.transactions.forEach(t=>{
  csv+=`${t.date},${t.amount},${t.category},${t.type}\n`;
 });
 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.csv";
 a.click();
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("dark-theme");
}

/* UPDATE */
function update(){
 calculate();
 renderTable();
}

/* START */
loadData();

</script>

</body>
  </html>

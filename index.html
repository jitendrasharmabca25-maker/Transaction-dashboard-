<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard Pro+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* THEME */
:root {
  --bg: #ffffff;
  --text: #000;
  --card: rgba(0,0,0,0.05);
}

.dark-theme {
  --bg: #0f172a;
  --text: #ffffff;
  --card: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: var(--bg);
  color: var(--text);
}

/* SECTION */
.section {
  margin-top: 20px;
}

/* GLASS + 3D */
.glass {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;

  box-shadow: 
    0 10px 25px rgba(0,0,0,0.2),
    inset 0 1px 1px rgba(255,255,255,0.2);

  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-6px) scale(1.02);
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap: 12px;
}

.card {
  text-align: center;
  padding: 15px;
  border-radius: 16px;

  background: linear-gradient(145deg, #ffffff10, #00000010);

  box-shadow:
    6px 6px 12px rgba(0,0,0,0.2),
    -6px -6px 12px rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-8px);
}

.income-text { color: #4ade80; }
.expense-text { color: #fb7185; }

/* CHARTS */
.chart-grid {
  display: grid;
  gap: 15px;
}

.chart-box {
  padding: 10px;
  border-radius: 16px;
  box-shadow:
    inset 2px 2px 5px rgba(0,0,0,0.2),
    inset -2px -2px 5px rgba(255,255,255,0.05);
}

/* BUTTON */
button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;

  background: linear-gradient(145deg, #1e293b, #0f172a);
  color: white;

  box-shadow:
    4px 4px 10px rgba(0,0,0,0.4),
    inset 1px 1px 2px rgba(255,255,255,0.2);
}

button:hover {
  transform: translateY(-2px);
}

/* CONTROLS */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  text-align: center;
}

tr:hover {
  transform: scale(1.01);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:300px;
}

input, select {
  width:100%;
  margin:6px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}

</style>
</head>

<body>

<div class="container">

<h1>💰 Finance Dashboard Pro+</h1>

<div class="glass">
<select id="role">
<option value="viewer">Viewer</option>
<option value="admin">Admin</option>
</select>

<button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
<button onclick="exportCSV()">📤 Export</button>
</div>

<!-- OVERVIEW -->
<div class="glass section">
<h2>📊 Financial Overview</h2>

<div class="cards">
<div class="card">
<p>Total Balance</p>
<span id="balance"></span>
</div>

<div class="card">
<p>Income</p>
<span id="income" class="income-text"></span>
</div>

<div class="card">
<p>Expenses</p>
<span id="expense" class="expense-text"></span>
</div>
</div>
</div>

<!-- CHARTS -->
<div class="glass section">
<h2>📈 Financial Analytics</h2>

<div class="chart-grid">
<div class="chart-box">
<h3>Spending Breakdown</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<h3>Balance Trend</h3>
<canvas id="lineChart"></canvas>
</div>
</div>
</div>

<!-- TRANSACTIONS -->
<div class="glass section">
<h2>💳 Transactions</h2>

<div class="controls">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('income')">Income</button>
<button onclick="setFilter('expense')">Expense</button>
<button onclick="sortByAmount()">Sort</button>
<input id="search" placeholder="🔍 Search..." onkeyup="renderTable()">
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Category</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="openModal()">➕ Add Transaction</button>

<!-- INSIGHTS -->
<div class="glass section">
<h2>🧠 Insights</h2>
<p id="insight">No insights yet...</p>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Add Transaction</h3>
<input id="amount" placeholder="Amount">
<input id="category" placeholder="Category">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button onclick="addTransaction()">Add</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>

const state = {
 transactions : JSON.parse(localStorage.getItem("data")) || [
  {date:"2026-03-25", amount:45000, category:"Salary", type:"income"},
  {date:"2026-03-27", amount:500, category:"Food", type:"expense"}
 ],
 filter: "all"
};

let pieChart, lineChart;

function save(){
 localStorage.setItem("data", JSON.stringify(state.transactions));
}

function calculate(){
 let income=0, expense=0;

 state.transactions.forEach(t=>{
  if(t.type==="income") income+=t.amount;
  else expense+=t.amount;
 });

 document.getElementById("income").innerText="₹"+income;
 document.getElementById("expense").innerText="₹"+expense;
 document.getElementById("balance").innerText="₹"+(income-expense);
}

function renderTable(){
 let body=document.getElementById("tableBody");
 let search=document.getElementById("search").value.toLowerCase();

 body.innerHTML="";

 let filtered = state.transactions
  .filter(t=>state.filter==="all"||t.type===state.filter)
  .filter(t=>t.category.toLowerCase().includes(search));

 if(filtered.length===0){
  body.innerHTML="<tr><td colspan='5'>No data</td></tr>";
  return;
 }

 filtered.forEach((t)=>{
  const index = state.transactions.indexOf(t);

  body.innerHTML+=`
  <tr>
  <td>${t.date}</td>
  <td class="${t.type==='income'?'income-text':'expense-text'}">₹${t.amount}</td>
  <td>${t.category}</td>
  <td>${t.type}</td>
  <td>
  <button onclick="deleteTransaction(${index})">Delete</button>
  </td>
  </tr>`;
 });
}

function setFilter(type){
 state.filter=type;
 renderTable();
}

function openModal(){
 if(getRole()!=="admin") return alert("Admin only");
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function addTransaction(){
 let amount = Number(document.getElementById("amount").value);
 let category = document.getElementById("category").value;
 let type = document.getElementById("type").value;

 if(!amount || !category) return alert("Invalid input");

 state.transactions.push({
  date:new Date().toISOString().split("T")[0],
  amount, category, type
 });

 closeModal();
 save();
 update();
}

function deleteTransaction(i){
 if(getRole()!=="admin") return alert("Admin only");

 if(confirm("Delete this transaction?")){
  state.transactions.splice(i,1);
  save();
  update();
 }
}

function sortByAmount(){
 state.transactions.sort((a,b)=>b.amount-a.amount);
 renderTable();
}

function drawCharts(){

 if(pieChart) pieChart.destroy();
 if(lineChart) lineChart.destroy();

 pieChart = new Chart(document.getElementById("pieChart"),{
  type:"pie",
  data:{
   labels:state.transactions.map(t=>t.category),
   datasets:[{
    data:state.transactions.map(t=>t.amount)
   }]
  }
 });

 lineChart = new Chart(document.getElementById("lineChart"),{
  type:"line",
  data:{
   labels:state.transactions.map(t=>t.date),
   datasets:[{
    label:"Trend",
    data:state.transactions.map(t=>t.amount),
    borderColor:"#00c6ff",
    tension:0.4
   }]
  }
 });
}

function exportCSV(){
 let csv="Date,Amount,Category,Type\n";
 state.transactions.forEach(t=>{
  csv+=`${t.date},${t.amount},${t.category},${t.type}\n`;
 });

 let blob=new Blob([csv],{type:"text/csv"});
 let url=URL.createObjectURL(blob);
 let a=document.createElement("a");
 a.href=url;
 a.download="transactions.csv";
 a.click();
}

function toggleTheme(){
 document.body.classList.toggle("dark-theme");
}

function getRole(){
 return document.getElementById("role").value;
}

function update(){
 calculate();
 renderTable();
 drawCharts();
}

update();

</script>

</body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard Pro+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#141e30,#243b55);
  color: white;
}

.container { padding: 15px; }

.glass {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap: 12px;
}

.card {
  text-align: center;
}

.card span {
  display: block;
  font-size: 22px;
  font-weight: bold;
}

.income-text { color: #4ade80; }
.expense-text { color: #fb7185; }

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  display: block;
  overflow-x: auto;
}

th, td {
  padding: 10px;
  text-align: center;
}

tr:hover {
  background: rgba(255,255,255,0.1);
}

.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:300px;
}

input, select {
  width:100%;
  margin:6px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Finance Dashboard Pro+</h1>

<div class="glass">
<select id="role">
<option value="viewer">Viewer</option>
<option value="admin">Admin</option>
</select>
<button onclick="toggleDark()">🌙 Dark</button>
<button onclick="exportCSV()">📤 Export</button>
</div>

<div class="cards">
<div class="glass card">
Balance
<span id="balance"></span>
</div>

<div class="glass card">
💰 Income
<span id="income" class="income-text"></span>
</div>

<div class="glass card">
💸 Expense
<span id="expense" class="expense-text"></span>
</div>
</div>

<div class="glass"><canvas id="pieChart"></canvas></div>
<div class="glass"><canvas id="lineChart"></canvas></div>

<div class="glass">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('income')">Income</button>
<button onclick="setFilter('expense')">Expense</button>
<button onclick="sortByAmount()">Sort</button>
<input id="search" placeholder="🔍 Search..." onkeyup="renderTable()">
</div>

<div class="glass">
<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Category</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="openModal()">➕ Add Transaction</button>

<div class="glass">
<h3>📊 Insights</h3>
<p id="insight"></p>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Add Transaction</h3>
<input id="amount" placeholder="Amount">
<input id="category" placeholder="Category">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button onclick="addTransaction()">Add</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>

const state = {
 transactions : JSON.parse(localStorage.getItem("data")) || [
  {date:"2026-03-25", amount:45000, category:"Salary", type:"income"},
  {date:"2026-03-27", amount:500, category:"Food", type:"expense"}
 ],
 filter: "all" // ✅ FIXED
};

let pieChart, lineChart;

function save(){
 localStorage.setItem("data", JSON.stringify(state.transactions));
}

function calculate(){
 let income=0, expense=0;

 state.transactions.forEach(t=>{
  if(t.type==="income") income+=t.amount;
  else expense+=t.amount;
 });

 document.getElementById("income").innerText="₹"+income;
 document.getElementById("expense").innerText="₹"+expense;
 document.getElementById("balance").innerText="₹"+(income-expense);
}

function renderTable(){
 let body=document.getElementById("tableBody");
 let search=document.getElementById("search").value.toLowerCase();

 body.innerHTML="";

 let filtered = state.transactions
  .filter(t=>state.filter==="all"||t.type===state.filter)
  .filter(t=>t.category.toLowerCase().includes(search));

 if(filtered.length===0){
  body.innerHTML="<tr><td colspan='5'>No data</td></tr>";
  return;
 }

 filtered.forEach((t)=>{
  const index = state.transactions.indexOf(t); // ✅ FIXED

  body.innerHTML+=`
  <tr>
  <td>${t.date}</td>
  <td class="${t.type==='income'?'income-text':'expense-text'}">₹${t.amount}</td>
  <td>${t.category}</td>
  <td>${t.type}</td>
  <td>
  <button onclick="deleteTransaction(${index})">Delete</button>
  </td>
  </tr>`;
 });
}

function setFilter(type){
 state.filter=type;
 renderTable();
}

function openModal(){
 if(getRole()!=="admin") return alert("Admin only");
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function addTransaction(){
 let amount = Number(document.getElementById("amount").value);
 let category = document.getElementById("category").value;
 let type = document.getElementById("type").value;

 if(!amount || !category) return alert("Invalid input");

 state.transactions.push({
  date:new Date().toISOString().split("T")[0],
  amount, category, type
 });

 closeModal();
 save();
 update();
}

function deleteTransaction(i){
 if(getRole()!=="admin") return alert("Admin only");

 if(confirm("Delete this transaction?")){
  state.transactions.splice(i,1);
  save();
  update();
 }
}

function sortByAmount(){
 state.transactions.sort((a,b)=>b.amount-a.amount);
 renderTable();
}

function drawCharts(){

 if(pieChart) pieChart.destroy();
 if(lineChart) lineChart.destroy();

 pieChart = new Chart(document.getElementById("pieChart"),{
  type:"pie",
  data:{
   labels:state.transactions.map(t=>t.category),
   datasets:[{
    data:state.transactions.map(t=>t.amount)
   }]
  }
 });

 lineChart = new Chart(document.getElementById("lineChart"),{
  type:"line",
  data:{
   labels:state.transactions.map(t=>t.date),
   datasets:[{
    label:"Trend",
    data:state.transactions.map(t=>t.amount),
    borderColor:"#00c6ff",
    tension:0.4
   }]
  }
 });
}

function exportCSV(){
 let csv="Date,Amount,Category,Type\n";
 state.transactions.forEach(t=>{
  csv+=`${t.date},${t.amount},${t.category},${t.type}\n`;
 });

 let blob=new Blob([csv],{type:"text/csv"});
 let url=URL.createObjectURL(blob);
 let a=document.createElement("a");
 a.href=url;
 a.download="transactions.csv";
 a.click();
}

function toggleDark(){
 document.body.classList.toggle("dark");
}

function getRole(){
 return document.getElementById("role").value;
}

function update(){
 calculate();
 renderTable();
 drawCharts();
}

update();

</script>

</body>
                                                    </html>
